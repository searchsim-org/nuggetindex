name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          for i in 1 2 3; do
            pip install --retries 5 --timeout 60 \
              -e ".[dev,langchain,llamaindex,haystack,openai,anthropic,google,doctor,seeds,web,eval,serve]" \
              && break
            echo "pip install failed, retrying ($i/3)..."
            sleep 10
          done
      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Test
        env:
          NO_COLOR: "1"
          TERM: "dumb"
        run: pytest tests/unit -v --ignore=tests/unit/hosted_demo
