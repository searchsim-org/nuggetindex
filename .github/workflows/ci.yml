name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Unit tests touch optional adapters (web, langchain, llamaindex,
          # haystack, openai, doctor, seeds, eval, serve). Pull those extras
          # plus [dev] so the suite runs end-to-end. Skipped: [dense]
          # (torch/faiss), [pgvector] / [elasticsearch] / [opensearch]
          # (need running services), [qdrant] / [pinecone] / [chroma] /
          # [ollama] (vendor-specific, need credentials or a local daemon).
          pip install -e ".[dev,langchain,llamaindex,haystack,openai,anthropic,google,doctor,seeds,web,eval,serve]"
      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Test
        run: pytest tests/unit -v --ignore=tests/unit/hosted_demo
